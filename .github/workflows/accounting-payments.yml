name: Accounting - Payments Reminder

on:
  schedule:
    # JST 09:00 = UTC 00:00
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  notify:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      TZ: Asia/Tokyo
      INPUT_BASE_DIR: ./data
      STATE_BASE_DIR: ./data
      OUTPUT_BASE_DIR: ./data

    steps:
      - name: リポジトリをチェックアウト
        uses: actions/checkout@v4

      - name: ichi-data リポをチェックアウト
        uses: ./.github/actions/checkout-data-repo
        with:
          data_repo: ${{ secrets.DATA_REPO_FULL_NAME }}
          token: ${{ secrets.DATA_REPO_TOKEN }}

      - name: Node.js セットアップ
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: 依存パッケージをインストール
        run: npm ci

      - name: 支払予定リマインダーを送信
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GMAIL_CLIENT_ID: ${{ secrets.GMAIL_CLIENT_ID }}
          GMAIL_CLIENT_SECRET: ${{ secrets.GMAIL_CLIENT_SECRET }}
          GMAIL_REFRESH_TOKEN: ${{ secrets.GMAIL_REFRESH_TOKEN }}
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          BUSINESS_NOTIFY_EMAIL: ${{ secrets.BUSINESS_NOTIFY_EMAIL }}
        run: npm run payments

      - name: 変更を ichi-data にコミット
        if: always()
        uses: ./.github/actions/commit-data-changes
        with:
          message: 'chore(state): payments リマインダー実行 (auto)'
          data_repo: ${{ secrets.DATA_REPO_FULL_NAME }}
          token: ${{ secrets.DATA_REPO_TOKEN }}

      - name: サマリー表示
        run: |
          echo "## 💰 支払予定リマインダー" >> $GITHUB_STEP_SUMMARY
          echo "実行日時: $(date '+%Y-%m-%d %H:%M JST')" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "ichi-data の \`sales/inputs/pipeline/\` に payable ファイルを配置してください。" >> $GITHUB_STEP_SUMMARY
          echo "DATA_REPO_FULL_NAME が未設定の場合は ichi-blog 配下にフォールバックします。" >> $GITHUB_STEP_SUMMARY

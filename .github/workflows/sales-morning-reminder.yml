name: Sales - Morning Action Reminder

on:
  schedule:
    # JST 09:00 = UTC 00:00
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  notify:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      TZ: Asia/Tokyo
      INPUT_BASE_DIR: ./data
      STATE_BASE_DIR: ./data
      OUTPUT_BASE_DIR: ./data

    steps:
      - name: リポジトリをチェックアウト
        uses: actions/checkout@v4

      - name: ichi-data リポをチェックアウト
        uses: ./.github/actions/checkout-data-repo
        with:
          data_repo: ${{ secrets.DATA_REPO_FULL_NAME }}
          token: ${{ secrets.DATA_REPO_TOKEN }}

      - name: Node.js セットアップ
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: 依存パッケージをインストール
        run: npm ci

      - name: 営業朝リマインダーを送信
        env:
          GMAIL_CLIENT_ID: ${{ secrets.GMAIL_CLIENT_ID }}
          GMAIL_CLIENT_SECRET: ${{ secrets.GMAIL_CLIENT_SECRET }}
          GMAIL_REFRESH_TOKEN: ${{ secrets.GMAIL_REFRESH_TOKEN }}
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          BUSINESS_NOTIFY_EMAIL: ${{ secrets.BUSINESS_NOTIFY_EMAIL }}
          SALES_SHEET_ID: ${{ secrets.SALES_SHEET_ID }}
        run: npm run sales:reminder

      - name: サマリー表示
        run: |
          echo "## 📊 営業朝リマインダー" >> $GITHUB_STEP_SUMMARY
          echo "実行日時: $(date '+%Y-%m-%d %H:%M JST')" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "ichi-data の \`sales/inputs/pipeline/\` にパイプライン MD を配置するか、" >> $GITHUB_STEP_SUMMARY
          echo "SALES_SHEET_ID を設定してください。未設定の場合は 0 件で正常終了します。" >> $GITHUB_STEP_SUMMARY

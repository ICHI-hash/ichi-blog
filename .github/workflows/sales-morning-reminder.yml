name: Sales - Morning Action Reminder

on:
  schedule:
    # JST 09:00 = UTC 00:00
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  notify:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      TZ: Asia/Tokyo

    steps:
      - name: リポジトリをチェックアウト
        uses: actions/checkout@v4

      - name: Node.js セットアップ
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: 依存パッケージをインストール
        run: npm ci

      - name: 営業朝リマインダーを送信
        env:
          GMAIL_CLIENT_ID: ${{ secrets.GMAIL_CLIENT_ID }}
          GMAIL_CLIENT_SECRET: ${{ secrets.GMAIL_CLIENT_SECRET }}
          GMAIL_REFRESH_TOKEN: ${{ secrets.GMAIL_REFRESH_TOKEN }}
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          BUSINESS_NOTIFY_EMAIL: ${{ secrets.BUSINESS_NOTIFY_EMAIL }}
          SALES_SHEET_ID: ${{ secrets.SALES_SHEET_ID }}
        run: npm run sales:reminder

      - name: サマリー表示
        run: |
          echo "## 📊 営業朝リマインダー" >> $GITHUB_STEP_SUMMARY
          echo "実行日時: $(date '+%Y-%m-%d %H:%M JST')" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**注意**: \`sales/inputs/pipeline/\` は gitignore のため Actions 環境には" >> $GITHUB_STEP_SUMMARY
          echo "存在しません。SALES_SHEET_ID が未設定の場合は対象 0 件で正常終了します。" >> $GITHUB_STEP_SUMMARY
